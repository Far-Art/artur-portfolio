<a class="skip-link" href="#main-content">Skip to content</a>
<div class="fa-shell">
    <div class="fa-backdrop" aria-hidden="true">
        <div class="fa-grid"></div>
        <div class="fa-orb fa-orb-one"></div>
        <div class="fa-orb fa-orb-two"></div>
        <div class="fa-orb fa-orb-three"></div>
    </div>

    <fa-header />

    <a routerLink="/"
       class="brand-logo-link"
       aria-label="Artur portfolio home"
       [class.no-click]="brandProgress() === '0'"
       [class.drop-shadow]="brandProgress() === '1'"
       [style.--brand-progress]="brandProgress()">
        <fa-logo />
    </a>

    <main id="main-content" class="fa-main" role="main">
        <router-outlet />
    </main>

    <fa-footer />
</div>
