<footer class="footer">
    <div class="footer-container" faPanel>
        <div class="footer-heading">
            <p class="footer-kicker">{{ t('footerKicker') }}</p>
            <h2>{{ t('footerTitle') }}</h2>
            <p class="footer-description">
                {{ t('footerDescription') }}
            </p>
        </div>

        <div class="footer-content">
            <div class="social-links" role="list">
                @for (link of socialLinks; track link.platform) {
                    @let openInNewTab = opensInNewTab(link.url);
                    <a
                        [href]="link.url"
                        [attr.target]="openInNewTab ? '_blank' : null"
                        [attr.rel]="openInNewTab ? 'noopener noreferrer' : null"
                        [attr.aria-label]="link.platform"
                        class="social-link"
                        role="listitem"
                        (click)="onSocialLinkClick(link)"
                    >
                        <span class="social-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false">
                                @for (path of socialIconPaths(link.icon); track path) {
                                    <path [attr.d]="path"></path>
                                }
                            </svg>
                        </span>
                        <span class="social-label">{{ link.platform }}</span>
                    </a>
                }
            </div>

            <div class="footer-meta">
                <p class="copyright">{{ t('copyright', {year: currentYear}) }}</p>
                <p class="built-with">{{ t('builtWith', {version: angularVersion}) }}</p>
            </div>
        </div>
    </div>
</footer>
