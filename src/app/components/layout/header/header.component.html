<header
    class="header"
    [style.opacity]="headerOpacity()"
    [style.transform]="headerTransform()"
    [style.pointer-events]="headerPointerEvents()">

    <nav class="nav-container" aria-label="Primary" faPanel>

        <ul
            #navLinks
            class="nav-links"
            role="list"
            (mouseleave)="handleListPointerLeave()"
            (focusout)="handleListFocusOut($event)"
            (scroll)="handleViewportChange()">
            <li
                class="nav-indicator"
                aria-hidden="true"
                role="presentation"
                [style.width.px]="indicatorWidth()"
                [style.height.px]="indicatorHeight()"
                [style.opacity]="indicatorOpacity()"
                [style.transform]="indicatorTransform()">
            </li>
            <li>
                <a
                    #homeLink
                    routerLink="/"
                    routerLinkActive="active"
                    [routerLinkActiveOptions]="{ exact: true }"
                    (mouseenter)="setInteractionTarget(homeLink)"
                    (focus)="setInteractionTarget(homeLink)"
                    (isActiveChange)="handleRouteActiveChange(homeLink, $event)">
                    Home
                </a>
            </li>
            <li>
                <a
                    #aboutLink
                    routerLink="/about"
                    routerLinkActive="active"
                    (mouseenter)="setInteractionTarget(aboutLink)"
                    (focus)="setInteractionTarget(aboutLink)"
                    (isActiveChange)="handleRouteActiveChange(aboutLink, $event)">
                    About
                </a>
            </li>
            <li>
                <a
                    #projectsLink
                    routerLink="/projects"
                    routerLinkActive="active"
                    (mouseenter)="setInteractionTarget(projectsLink)"
                    (focus)="setInteractionTarget(projectsLink)"
                    (isActiveChange)="handleRouteActiveChange(projectsLink, $event)">
                    Projects
                </a>
            </li>
            <!--            <li>-->
            <!--                <a routerLink="/experience" routerLinkActive="active">Experience</a>-->
            <!--            </li>-->
            <li>
                <a
                    #contactLink
                    routerLink="/contact"
                    routerLinkActive="active"
                    (mouseenter)="setInteractionTarget(contactLink)"
                    (focus)="setInteractionTarget(contactLink)"
                    (isActiveChange)="handleRouteActiveChange(contactLink, $event)">
                    Contact
                </a>
            </li>
        </ul>

        <button
            class="theme-toggle"
            type="button"
            (click)="toggleTheme($event)"
            [attr.aria-label]="'Switch to ' + (theme() === 'light' ? 'dark' : 'light') + ' theme'"
            [attr.aria-pressed]="theme() === 'dark'"
        >
            <span class="theme-label">{{ theme() === 'light' ? 'Dark mode' : 'Light mode' }}</span>
        </button>
    </nav>
</header>
