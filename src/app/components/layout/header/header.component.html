<header
    class="header"
    [style.opacity]="headerOpacity()"
    [style.transform]="headerTransform()"
    [style.pointer-events]="headerPointerEvents()">

    <nav class="nav-container" [attr.aria-label]="t('navAria')" faPanel>

        <ul
            #navLinks
            class="nav-links"
            role="list"
            (mouseleave)="handleListPointerLeave()"
            (focusout)="handleListFocusOut($event)"
            (scroll)="handleViewportChange()">
            <li
                class="nav-indicator"
                aria-hidden="true"
                role="presentation"
                [style.width.px]="indicatorWidth()"
                [style.height.px]="indicatorHeight()"
                [style.opacity]="indicatorOpacity()"
                [style.transform]="indicatorTransform()">
            </li>
            <li>
                <a
                    #aboutLink
                    routerLink="/about"
                    routerLinkActive="active"
                    (mouseenter)="setInteractionTarget(aboutLink)"
                    (focus)="setInteractionTarget(aboutLink)"
                    (isActiveChange)="handleRouteActiveChange(aboutLink, $event)">
                    <span class="material-symbols-rounded">badge</span>
                    {{ t('about') }}
                </a>
            </li>
<!--            <li>-->
<!--                <a-->
<!--                    #projectsLink-->
<!--                    routerLink="/projects"-->
<!--                    routerLinkActive="active"-->
<!--                    (mouseenter)="setInteractionTarget(projectsLink)"-->
<!--                    (focus)="setInteractionTarget(projectsLink)"-->
<!--                    (isActiveChange)="handleRouteActiveChange(projectsLink, $event)">-->
<!--                    Projects-->
<!--                </a>-->
<!--            </li>-->
            <!--            <li>-->
            <!--                <a routerLink="/experience" routerLinkActive="active">Experience</a>-->
            <!--            </li>-->
            <li>
                <a
                    #contactLink
                    routerLink="/contact"
                    routerLinkActive="active"
                    (mouseenter)="setInteractionTarget(contactLink)"
                    (focus)="setInteractionTarget(contactLink)"
                    (isActiveChange)="handleRouteActiveChange(contactLink, $event)">
                    <span class="material-symbols-rounded">mail</span>
                    {{ t('contact') }}
                </a>
            </li>
        </ul>

        <div class="nav-utilities">
            <label class="language-select">
                <span class="sr-only">{{ t('languageSelectLabel') }}</span>
                <span class="language-select-value" aria-hidden="true">
                    {{ language() === 'en' ? '🇺🇸' : '🇮🇱' }}
                </span>
                <select
                    [value]="language()"
                    (change)="setLanguage($event)"
                    [attr.aria-label]="t('languageSelectLabel')"
                >
                    <option value="en">🇺🇸 {{ t('languageEnglish') }}</option>
                    <option value="he">🇮🇱 {{ t('languageHebrew') }}</option>
                </select>
            </label>

            <button
                class="utility-toggle theme-toggle"
                type="button"
                (click)="toggleTheme($event)"
                [attr.aria-label]="theme() === 'light' ? t('switchToDarkTheme') : t('switchToLightTheme')"
                [attr.aria-pressed]="theme() === 'dark'"
            >
                <span class="material-symbols-rounded" aria-hidden="true">
                    {{ theme() === 'light' ? 'dark_mode' : 'light_mode' }}
                </span>
                <span class="utility-label">{{ theme() === 'light' ? t('themeDark') : t('themeLight') }}</span>
            </button>
        </div>
    </nav>
</header>
